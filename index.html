<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>AikiDojo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&family=Ubuntu+Condensed&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<style>

@import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&family=Ubuntu+Condensed&display=swap');

/* ── Reset & base ─────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:#f7f7f7;color:#1a1a1a;font-family:'Ubuntu',sans-serif;font-size:14px;line-height:1.6;}

/* ── App shell: header+nav fixed, content scrolls inside ─────────────────── */
.app-wrap{
  height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
}
.grid-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(#eee 1px,transparent 1px),linear-gradient(90deg,#eee 1px,transparent 1px);
  background-size:40px 40px;opacity:.5;
}

/* ── Header ──────────────────────────────────────────────────────────────── */
.hdr{
  position:relative;z-index:20;
  background:#fff;border-bottom:1px solid #eee;
  flex-shrink:0;
}
.hdr-in{
  max-width:1200px;margin:0 auto;padding:12px 28px;
  display:flex;align-items:center;
}
.logo-row{display:flex;align-items:center;gap:14px;}
.wordmark{font-family:'Ubuntu Condensed',sans-serif;font-size:26px;letter-spacing:6px;line-height:1;}
.wordmark span{color:#c0392b;}
.tagline{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#888;margin-top:2px;font-weight:500;}

/* ── Nav ─────────────────────────────────────────────────────────────────── */
.nav{
  position:relative;z-index:20;
  background:#fff;border-bottom:1px solid #eee;
  flex-shrink:0;
}
.nav-in{
  max-width:1200px;margin:0 auto;padding:0 28px;
  display:flex;overflow-x:auto;
  scrollbar-width:none;-ms-overflow-style:none;
}
.nav-in::-webkit-scrollbar{display:none;}
.ntab{
  background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;font-family:'Ubuntu Condensed',sans-serif;
  font-size:14px;letter-spacing:3px;color:#888;
  padding:13px 18px 11px;white-space:nowrap;
  transition:all .15s;flex-shrink:0;
}
.ntab:hover{color:#1a1a1a;}
.ntab.on{color:#c0392b;border-bottom-color:#c0392b;}

/* ── Main scrollable content area ───────────────────────────────────────── */
.main{
  position:relative;z-index:1;
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}
.main-inner{
  max-width:1200px;margin:0 auto;
  padding:28px 28px 48px;
}

/* ── Footer ──────────────────────────────────────────────────────────────── */
.ftr{
  flex-shrink:0;
  text-align:center;padding:12px;
  border-top:1px solid #eee;background:#fff;
  font-family:'Ubuntu Condensed',sans-serif;font-size:10px;letter-spacing:4px;color:#c0c0c0;
  position:relative;z-index:20;
}

/* ── Section ─────────────────────────────────────────────────────────────── */
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:8px;}
.section-title{font-family:'Ubuntu Condensed',sans-serif;font-size:30px;letter-spacing:4px;}
.rule{height:1px;background:linear-gradient(to right,#c0392b,#eee 55%,transparent);margin:6px 0 22px;}

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  background:#1a1a1a;color:#fff;border:none;cursor:pointer;
  font-family:'Ubuntu Condensed',sans-serif;font-size:13px;letter-spacing:3px;
  padding:9px 18px 7px;transition:background .15s;white-space:nowrap;
}
.btn:hover{background:#444;}
.btn.red{background:#c0392b;}.btn.red:hover{background:#96281b;}
.ghost{
  background:transparent;color:#1a1a1a;
  border:1.5px solid #c0c0c0;
  font-family:'Ubuntu Condensed',sans-serif;font-size:13px;letter-spacing:3px;
  padding:8px 16px 6px;cursor:pointer;transition:border-color .15s;
}
.ghost:hover{border-color:#1a1a1a;}
.ghost.sm{padding:5px 11px 3px;font-size:11px;letter-spacing:2px;}

/* ── Cards & lists ───────────────────────────────────────────────────────── */
.card{background:#fff;border:1px solid #eee;border-left:3px solid #c0392b;padding:18px 20px 14px;margin-bottom:10px;}
label{display:block;font-family:'Ubuntu Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:#888;margin-bottom:4px;}
input,textarea,select{
  width:100%;font-family:'Ubuntu',sans-serif;font-size:14px;color:#1a1a1a;
  background:#fff;border:1.5px solid #eee;padding:8px 11px;
  outline:none;border-radius:0;appearance:none;
}
input:focus,textarea:focus,select:focus{border-color:#1a1a1a;}
textarea{resize:vertical;}
.fg{margin-bottom:13px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}

/* ── Tags ────────────────────────────────────────────────────────────────── */
.tag{
  display:inline-block;margin:2px;padding:3px 9px;
  font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  background:#f7f7f7;color:#444;border:1px solid #c0c0c0;
  cursor:pointer;transition:all .12s;
}
.tag:hover,.tag.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}

/* ── Stats ───────────────────────────────────────────────────────────────── */
.stats-row{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
.stat-box{flex:1;min-width:90px;background:#fff;border:1px solid #eee;border-top:3px solid #1a1a1a;padding:14px 14px 10px;}
.stat-box.red{border-top-color:#c0392b;}
.stat-num{font-family:'Ubuntu Condensed',sans-serif;font-size:38px;color:#1a1a1a;line-height:1;}
.stat-num.red{color:#c0392b;}
.stat-lbl{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#888;margin-top:2px;}

/* ── Grids ───────────────────────────────────────────────────────────────── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}

/* ── Filters ─────────────────────────────────────────────────────────────── */
.filter-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:flex-end;}
.filter-row>div{flex:1;min-width:120px;}
.period-btn{
  background:#fff;border:1.5px solid #eee;
  font-family:'Ubuntu Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:#888;
  padding:6px 12px 4px;cursor:pointer;transition:all .15s;
}
.period-btn:hover{border-color:#1a1a1a;color:#1a1a1a;}
.period-btn.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}

/* ── Attendance pills ────────────────────────────────────────────────────── */
.att-grid{display:flex;flex-wrap:wrap;gap:6px;}
.att-pill{padding:5px 12px;font-size:12px;font-weight:500;border:1.5px solid #eee;background:#fff;color:#444;cursor:pointer;transition:all .12s;}
.att-pill.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.divider{height:1px;background:#eee;margin:14px 0;}

/* ── Modals ──────────────────────────────────────────────────────────────── */
.modal-bg{
  position:fixed;inset:0;z-index:300;
  background:rgba(10,10,10,.55);
  display:flex;align-items:flex-start;justify-content:center;
  padding:40px 16px;overflow-y:auto;
}
.modal{
  background:#fff;border-top:3px solid #c0392b;
  width:100%;max-width:600px;
  padding:28px 28px 22px;position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal.wide{max-width:780px;}
.modal-title{font-family:'Ubuntu Condensed',sans-serif;font-size:24px;letter-spacing:4px;margin-bottom:18px;}
.modal-x{position:absolute;top:12px;right:14px;background:none;border:none;cursor:pointer;font-size:16px;color:#888;line-height:1;}
.modal-x:hover{color:#1a1a1a;}
.cat-btn{padding:6px 13px;font-family:'Ubuntu Condensed',sans-serif;font-size:12px;letter-spacing:2px;border:1.5px solid #eee;background:#fff;color:#888;cursor:pointer;margin:2px;transition:all .15s;}

/* ── Typography helpers ──────────────────────────────────────────────────── */
.s-eyebrow{font-family:'Ubuntu Condensed',sans-serif;font-size:10px;letter-spacing:3px;color:#888;margin-bottom:2px;}
.s-title{font-weight:700;font-size:17px;margin-bottom:3px;}
.s-meta{font-size:11px;color:#888;margin-bottom:8px;}
.expand-btn{background:none;border:none;cursor:pointer;font-family:'Ubuntu Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:#c0392b;padding:0;margin-top:7px;}

/* ── Learn items ─────────────────────────────────────────────────────────── */
.learn-item{border-left:2px solid #eee;padding:9px 13px;margin-bottom:7px;background:#f7f7f7;}

/* ── Category bar / tabs ─────────────────────────────────────────────────── */
.cat-bar{display:flex;border-bottom:2px solid #eee;margin-bottom:18px;overflow-x:auto;scrollbar-width:none;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-tab{
  background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;
  cursor:pointer;font-family:'Ubuntu Condensed',sans-serif;font-size:13px;letter-spacing:3px;
  color:#888;padding:10px 18px 8px;white-space:nowrap;transition:all .15s;flex-shrink:0;
}
.cat-tab.on{color:#1a1a1a;border-bottom-color:#1a1a1a;}

/* ── Journal ─────────────────────────────────────────────────────────────── */
.lj-group{margin-bottom:22px;}
.lj-group-head{font-family:'Ubuntu Condensed',sans-serif;font-size:16px;letter-spacing:3px;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.lj-entry{background:#fff;border:1px solid #eee;padding:12px 16px;margin-bottom:6px;border-left:3px solid #eee;}
.lj-entry.ca{border-left-color:#c0392b;}.lj-entry.cr{border-left-color:#2a6496;}.lj-entry.ct{border-left-color:#27704a;}.lj-entry.cw{border-left-color:#7a4a0a;}
.cat-badge{display:inline-block;padding:1px 7px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:2px;margin-bottom:4px;}
.entry-session{font-size:11px;color:#888;font-style:italic;margin-top:3px;}

/* ── Seminar cards ───────────────────────────────────────────────────────── */
.sem-card{background:#fff;border:1px solid #eee;padding:18px;transition:box-shadow .15s;}
.sem-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);}
.att-rec{background:#fff;border:1px solid #eee;border-top:3px solid #1a1a1a;padding:20px;margin-bottom:8px;cursor:pointer;}
.att-rec.open{border-top-color:#c0392b;}
.instr-bar{display:flex;border-bottom:1px solid #eee;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;}
.instr-bar::-webkit-scrollbar{display:none;}
.instr-tab{background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Ubuntu Condensed',sans-serif;font-size:12px;letter-spacing:2px;color:#888;padding:8px 14px 7px;white-space:nowrap;flex-shrink:0;}
.instr-tab.on{color:#c0392b;border-bottom-color:#c0392b;}

/* ── Encyclopedia cards ──────────────────────────────────────────────────── */
.enc-card{background:#fff;border:1px solid #eee;padding:18px;cursor:pointer;transition:all .15s;}
.enc-card:hover{border-color:#c0c0c0;box-shadow:0 4px 14px rgba(0,0,0,.06);}

/* ── Grading timeline ────────────────────────────────────────────────────── */
.timeline{position:relative;padding-left:28px;}
.timeline::before{content:"";position:absolute;left:8px;top:0;bottom:0;width:2px;background:#eee;}
.t-entry{position:relative;margin-bottom:16px;}
.t-entry::before{content:"";position:absolute;left:-22px;top:12px;width:10px;height:10px;border-radius:50%;background:#1a1a1a;border:2px solid #fff;box-shadow:0 0 0 2px #1a1a1a;}
.t-entry.cur::before{background:#c0392b;box-shadow:0 0 0 2px #c0392b;}
.t-entry.fut::before{background:#fff;border-color:#c0c0c0;box-shadow:0 0 0 2px #c0c0c0;}
.t-card{background:#fff;border:1px solid #eee;padding:14px 16px;}
.t-card.fut{background:#f7f7f7;border-style:dashed;opacity:.6;}
.progress-bar{background:#eee;height:5px;border-radius:3px;margin:10px 0 3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(to right,#1a1a1a,#c0392b);}

/* ── Misc ────────────────────────────────────────────────────────────────── */
.video-ph{background:#f7f7f7;border:1.5px dashed #c0c0c0;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;margin-top:14px;font-family:'Ubuntu Condensed',sans-serif;font-size:11px;letter-spacing:3px;color:#c0c0c0;}
.empty-state{text-align:center;padding:44px 20px;color:#c0c0c0;}
.empty-state-icon{font-family:'Ubuntu Condensed',sans-serif;font-size:42px;letter-spacing:6px;display:block;opacity:.1;margin-bottom:10px;}

/* ── TABLET (≤900px) ─────────────────────────────────────────────────────── */
@media(max-width:900px){
  .g3{grid-template-columns:1fr 1fr;}
  .hdr-in{padding:12px 20px;}
  .main-inner{padding:22px 20px 40px;}
  .nav-in{padding:0 20px;}
}

/* ── MOBILE (≤600px) ─────────────────────────────────────────────────────── */
@media(max-width:600px){
  html,body{overflow:hidden;}

  /* Header: compact logo */
  .hdr-in{padding:10px 14px;}
  .tagline{display:none;}
  .wordmark{font-size:22px;letter-spacing:4px;}
  .logo-row svg{width:34px;height:34px;}

  /* Nav: smaller tabs, full scroll */
  .nav-in{padding:0 10px;}
  .ntab{font-size:11px;letter-spacing:2px;padding:10px 12px 8px;}

  /* Main content: tighter padding */
  .main-inner{padding:16px 14px 80px;}

  /* Section headers stack */
  .section-head{flex-direction:column;align-items:flex-start;gap:10px;}
  .section-title{font-size:24px;letter-spacing:3px;}

  /* Stats: 2-up then wrap */
  .stat-box{min-width:calc(50% - 5px);}
  .stat-num{font-size:30px;}

  /* Grids all single column */
  .g2,.g3,.fr{grid-template-columns:1fr;}

  /* Buttons full-width in action areas */
  .fa{flex-direction:column-reverse;}
  .fa .btn,.fa .ghost{width:100%;justify-content:center;text-align:center;}

  /* Modals: full height on mobile */
  .modal-bg{padding:0;align-items:flex-end;}
  .modal{
    max-width:100%;max-height:92vh;
    overflow-y:auto;border-radius:0;
    border-top-width:4px;
    padding:22px 18px 32px;
  }
  .modal.wide{max-width:100%;}

  /* Attendance pills wrap tighter */
  .att-pill{padding:7px 10px;font-size:11px;}

  /* Filter rows stack */
  .filter-row>div{min-width:100%;flex:none;}

  /* Period buttons wrap */
  .period-btn{padding:8px 10px 6px;font-size:10px;}

  /* Tags slightly larger tap target */
  .tag{padding:5px 10px;font-size:10px;}

  /* Cat tabs smaller */
  .cat-tab{font-size:11px;letter-spacing:2px;padding:8px 12px 6px;}

  /* Technique confidence rows stack */
  .tech-conf-row{flex-direction:column;align-items:flex-start !important;gap:6px !important;}

  /* Card padding tighter */
  .card{padding:14px 14px 12px;}
  .sem-card,.att-rec,.t-card{padding:14px;}

  /* Hide footer text on mobile — just a thin line */
  .ftr{font-size:8px;letter-spacing:2px;padding:10px;}
}

/* ── VERY SMALL (≤380px) ─────────────────────────────────────────────────── */
@media(max-width:380px){
  .ntab{font-size:10px;letter-spacing:1px;padding:9px 9px 7px;}
  .stat-box{min-width:100%;}
}

</style>
</head>

// Map technique NAME → syllabus tech id (for syncing)
const TECH_NAME_TO_IDS = (() => {
  const map = {};
  SYLLABUS.techniques.forEach(t => {
    if (!map[t.name]) map[t.name] = [];
    map[t.name].push(t.id);
  });
  return map;
})();

const CONF_LABELS = ["—","Unfamiliar","Seen it","Can do it","Comfortable","Exam-ready"];
const CONF_COLORS = ["#ccc","#e74c3c","#e67e22","#f1c40f","#2ecc71","#27ae60"];

// Mini inline confidence rater: shows stars for ONE technique name
// If the technique is in the grading syllabus, stars sync with grading journey
function InlineConf({ techName, confidence, setConfidence, compact }) {
  const ids = TECH_NAME_TO_IDS[techName] || [];
  if (!ids.length) return null; // not in syllabus, don't show

  // Average across all attack variants of this technique name
  const avgVal = (() => {
    const vals = ids.map(id => confidence[id] || 0);
    const nonzero = vals.filter(v=>v>0);
    return nonzero.length ? Math.round(nonzero.reduce((a,v)=>a+v,0)/nonzero.length) : 0;
  })();

  const setAll = (stars) => {
    setConfidence(prev => {
      const next = {...prev};
      ids.forEach(id => { next[id] = stars === next[id] ? 0 : stars; });
      return next;
    });
  };

  return (
    <div style={{display:"flex",alignItems:"center",gap:compact?4:8,marginTop:compact?2:5,flexWrap:"wrap"}}>
      <span style={{fontFamily:"'Ubuntu Condensed',sans-serif",fontSize:9,letterSpacing:2,color:"#aaa"}}>CONFIDENCE</span>
      <div style={{display:"flex",gap:compact?1:2}}>
        {[1,2,3,4,5].map(s => (
          <button key={s} onClick={e=>{e.stopPropagation();setAll(s);}}
            style={{background:"none",border:"none",cursor:"pointer",padding:"0 1px",
              fontSize:compact?12:14,lineHeight:1,
              color:s<=avgVal?CONF_COLORS[avgVal]:"#ddd",transition:"color .12s"}}>
            ★
          </button>
        ))}
      </div>
      {avgVal>0 && <span style={{fontSize:10,color:CONF_COLORS[avgVal],fontWeight:600}}>{CONF_LABELS[avgVal]}</span>}
    </div>
  );
}

// ── Learning Journal ──────────────────────────────────────────────────────────
function LearningJournal({sessions, setSessions, confidence, setConfidence}) {
  const [activeCat, setActiveCat] = useState("all");
  const [search, setSearch]       = useState("");
  const [showModal, setShowModal] = useState(false);
  const [nl, setNl] = useState({text:"",techniques:[],category:"",sessionId:""});

  const allL = useMemo(() => {
    const out = [];
    sessions.forEach(s => s.learnings.forEach(l => out.push({...l, sessionDate:s.date, sessionTheme:s.theme, sessionId:s.id})));
    return out;
  }, [sessions]);

  const filtered = useMemo(() => {
    let list = allL;
    if (activeCat!=="all") list = list.filter(l=>l.category===activeCat);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(l => l.text.toLowerCase().includes(q) || l.techniques.some(t=>t.toLowerCase().includes(q)));
    }
    return list;
  }, [allL, activeCat, search]);

  const grouped = useMemo(() => {
    const map = {};
    filtered.forEach(l => {
      const keys = l.techniques.length ? l.techniques : ["General"];
      keys.forEach(k => { if(!map[k]) map[k]=[]; map[k].push(l); });
    });
    return Object.entries(map).sort(([a],[b]) => a==="General"?1:b==="General"?-1:a.localeCompare(b));
  }, [filtered]);

  const counts = useMemo(() => {
    const c = {all:allL.length};
    CATS.forEach(cat => { c[cat.id] = allL.filter(l=>l.category===cat.id).length; });
    return c;
  }, [allL]);

  const saveLearning = () => {
    if (!nl.text.trim()) return;
    const entry = {id:uid(), text:nl.text, techniques:nl.techniques, category:nl.category};
    const sid = nl.sessionId ? +nl.sessionId : null;
    setSessions(p => {
      if (sid) return p.map(s => s.id===sid ? {...s, learnings:[...s.learnings,entry]} : s);
      if (!p.length) return p;
      return [{ ...p[0], learnings:[...p[0].learnings, entry] }, ...p.slice(1)];
    });
    setNl({text:"",techniques:[],category:"",sessionId:""});
    setShowModal(false);
  };

  return (
    <div>
      <div className="stats-row">
        <div className="stat-box"><div className="stat-num">{allL.length}</div><div className="stat-lbl">Total Learnings</div></div>
        <div className="stat-box red"><div className="stat-num red">{grouped.length}</div><div className="stat-lbl">Techniques</div></div>
        <div className="stat-box"><div className="stat-num">{sessions.length}</div><div className="stat-lbl">Sessions</div></div>
      </div>
      <div className="section-head">
        <div className="section-title">Learning Journal</div>
        <button className="btn red" onClick={()=>setShowModal(true)}>+ New Learning</button>
      </div>
      <div className="rule"/>

      <div className="cat-bar">
        {[["all","All"],...CATS.map(c=>[c.id,c.label])].map(([id,label]) => {
          const cat = CATS.find(c=>c.id===id);
          return (
            <button key={id} className={"cat-tab"+(activeCat===id?" on":"")}
              style={activeCat===id && cat ? {color:cat.color, borderBottomColor:cat.color} : {}}
              onClick={()=>setActiveCat(id)}>
              {label} <span style={{fontSize:10,color:S.dg,fontFamily:"'Ubuntu',sans-serif",fontWeight:600}}>({counts[id]||0})</span>
            </button>
          );
        })}
      </div>

      <div style={{marginBottom:16}}>
        <input placeholder="Search by technique or keyword…" value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:360}}/>
      </div>

      {grouped.length===0 && <Empty label="LEARN"/>}

      {grouped.map(([tech, learnings]) => (
        <div className="lj-group" key={tech}>
          <div className="lj-group-head">
            {tech}
            <span style={{fontSize:11,color:S.dg,fontFamily:"'Ubuntu',sans-serif",fontWeight:600}}>{learnings.length} entr{learnings.length!==1?"ies":"y"}</span>
          </div>
          {learnings.map(l => {
            const cat = CATS.find(c=>c.id===l.category);
            const cls = l.category ? ({attack:"ca",receiving:"cr",throws:"ct",weapons:"cw"}[l.category]||"") : "";
            return (
              <div key={l.id+"-"+tech} className={"lj-entry"+(cls?" "+cls:"")}>
                {cat && <span className="cat-badge" style={{background:cat.bg,color:cat.color}}>{cat.label}</span>}
                <div style={{fontSize:13,lineHeight:1.75,marginTop:cat?3:0,marginBottom:5}}>{l.text}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:3}}>
                  {l.techniques.filter(t=>t!==tech).map(t=><span key={t} className="tag" style={{cursor:"default"}}>{t}</span>)}
                </div>
                {l.techniques.map(t => <InlineConf key={t} techName={t} confidence={confidence} setConfidence={setConfidence} compact/>)}
                {l.sessionDate && <div className="entry-session">From: {l.sessionTheme} — {fmtS(l.sessionDate)}</div>}
              </div>
            );
          })}
        </div>
      ))}

      <Modal open={showModal} onClose={()=>setShowModal(false)} title="New Learning">
        <div className="fg"><label>Category</label><CatPicker value={nl.category} onChange={v=>setNl(p=>({...p,category:v}))}/></div>
        <div className="fg"><label>Insight</label><textarea rows={4} placeholder="What did you discover?" value={nl.text} onChange={e=>setNl(p=>({...p,text:e.target.value}))}/></div>
        <div className="fg"><label>Tag Techniques</label><TechTags selected={nl.techniques} onToggle={t=>setNl(p=>({...p,techniques:p.techniques.includes(t)?p.techniques.filter(x=>x!==t):[...p.techniques,t]}))} /></div>
        <div className="fg"><label>Link to Session (optional)</label>
          <select value={nl.sessionId} onChange={e=>setNl(p=>({...p,sessionId:e.target.value}))}>
            <option value="">— No session linked —</option>
            {sessions.map(s=><option key={s.id} value={s.id}>{fmt(s.date)} · {s.theme}</option>)}
          </select>
        </div>
        <div className="fa">
          <button className="ghost" onClick={()=>setShowModal(false)}>Cancel</button>
          <button className="btn red" onClick={saveLearning}>Save Learning</button>
        </div>
      </Modal>
    </div>
  );
}

        <div className="fa"><button className="ghost" onClick={()=>setShowLearnModal(null)}>Cancel</button><button className="btn red" onClick={saveLearn}>Save</button></div>
      </Modal>
    </div>
  );

// ── Grading Journey ───────────────────────────────────────────────────────────

function GradingJourney({ sessions, confidence, setConfidence }) {
  const [activeGroup, setActiveGroup] = useState("All");

  // ── Attendance tracker: pull from sessions ────────────────────────────────
  // Syllabus counts "days of practice" — each session = 1 practice day
  const totalDays    = sessions.length;
  const totalMinutes = sessions.reduce((a,s) => a + s.duration, 0);
  const totalHours   = Math.round((totalMinutes / 60) * 10) / 10;
  const pctDays      = Math.min(100, Math.round((totalDays / SYLLABUS.requiredDays) * 100));

  // Weekly breakdown (last 8 weeks)
  const weeklyData = (() => {
    const now  = new Date();
    const weeks = [];
    for (let w = 7; w >= 0; w--) {
      const start = new Date(now); start.setDate(now.getDate() - w*7 - 6);
      const end   = new Date(now); end.setDate(now.getDate() - w*7);
      const startStr = start.toISOString().slice(0,10);
      const endStr   = end.toISOString().slice(0,10);
      const hrs = sessions.filter(s=>s.date>=startStr&&s.date<=endStr).reduce((a,s)=>a+s.duration,0)/60;
      weeks.push({ label: fmtS(endStr), hrs: Math.round(hrs*10)/10 });
    }
    return weeks;
  })();

  const maxWeekHrs = Math.max(...weeklyData.map(w=>w.hrs), 2);

  // ── Technique confidence tracker ──────────────────────────────────────────
  const groups = ["All", ...Object.keys(GROUP_COLORS)];
  const visibleTechs = SYLLABUS.techniques.filter(t =>
    activeGroup==="All" || t.group===activeGroup
  );

  const avgConfidence = (() => {
    const vals = SYLLABUS.techniques.map(t => confidence[t.id] || 0).filter(v=>v>0);
    if (!vals.length) return 0;
    return Math.round((vals.reduce((a,v)=>a+v,0)/vals.length)*10)/10;
  })();
  const readyCount = SYLLABUS.techniques.filter(t=>(confidence[t.id]||0)>=4).length;
  const pctReady   = Math.round((readyCount/SYLLABUS.techniques.length)*100);

  const setStars = (techId, stars) => {
    setConfidence(prev => ({ ...prev, [techId]: stars }));
  };

  const Stars = ({ techId }) => {
    const val = confidence[techId] || 0;
    return (
      <div style={{display:"flex",gap:3}}>
        {[1,2,3,4,5].map(s => (
          <button key={s} onClick={()=>setStars(techId, val===s ? 0 : s)}
            style={{background:"none",border:"none",cursor:"pointer",padding:1,fontSize:16,lineHeight:1,
              color:s<=val?"#c0392b":"#ddd", transition:"color .12s"}}>
            ★
          </button>
        ))}
      </div>
    );
  };

  return (
    <div>
      {/* Header */}
      <div style={{background:"#fff",border:"1px solid #eee",borderTop:"3px solid #c0392b",padding:"18px 20px",marginBottom:22}}>
        <div style={{fontFamily:S.bebas,fontSize:10,letterSpacing:3,color:"#888",marginBottom:6}}>GRADING PREPARATION</div>
        <div style={{display:"flex",alignItems:"baseline",gap:14,flexWrap:"wrap"}}>
          <div style={{fontFamily:S.bebas,fontSize:32,letterSpacing:4}}>{SYLLABUS.currentGrade}</div>
          <div style={{fontFamily:S.bebas,fontSize:18,color:"#888",letterSpacing:2}}>→</div>
          <div style={{fontFamily:S.bebas,fontSize:32,letterSpacing:4,color:"#c0392b"}}>{SYLLABUS.nextGrade}</div>
        </div>
        <div style={{fontSize:12,color:"#888",marginTop:4}}>Aikikai Hombu Dojo curriculum · Focus on readiness for examination</div>
      </div>

      {/* ── 1. Attendance Tracker ── */}
      <div className="section-head">
        <div className="section-title">Attendance Tracker</div>
      </div>
      <div className="rule"/>

      <div className="stats-row">
        <div className="stat-box"><div className="stat-num">{totalDays}</div><div className="stat-lbl">Days Practiced</div></div>
        <div className="stat-box red"><div className="stat-num red">{totalHours}<span style={{fontSize:16}}>h</span></div><div className="stat-lbl">Hours Logged</div></div>
        <div className="stat-box"><div className="stat-num">{SYLLABUS.requiredDays}</div><div className="stat-lbl">Days Required</div></div>
        <div className="stat-box"><div className="stat-num">{pctDays}<span style={{fontSize:16}}>%</span></div><div className="stat-lbl">Days Progress</div></div>
      </div>

      {/* Hours progress bar */}
      <div style={{background:"#fff",border:"1px solid #eee",padding:"16px 18px",marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontFamily:S.bebas,fontSize:11,letterSpacing:2,color:"#888"}}>DAYS OF PRACTICE TOWARD GRADING</span>
          <span style={{fontFamily:S.bebas,fontSize:11,letterSpacing:2,color:"#c0392b"}}>{totalDays} / {SYLLABUS.requiredDays} days</span>
        </div>
        <div className="progress-bar" style={{height:10,borderRadius:4}}>
          <div className="progress-fill" style={{width:pctDays+"%", borderRadius:4}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
          <span style={{fontSize:11,color:"#888"}}>0h</span>
          <span style={{fontSize:11,color:"#888"}}>{Math.max(0,SYLLABUS.requiredDays-totalDays)} days remaining</span>
        </div>

        {/* Weekly bar chart */}
        <div style={{marginTop:18}}>
          <div style={{fontFamily:S.bebas,fontSize:10,letterSpacing:2,color:"#888",marginBottom:10}}>WEEKLY TRAINING (LAST 8 WEEKS)</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:6,height:60}}>
            {weeklyData.map((w,i) => (
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{fontFamily:S.bebas,fontSize:9,color:"#888"}}>{w.hrs>0?w.hrs+"h":""}</div>
                <div style={{
                  width:"100%", background: w.hrs>0?"#c0392b":"#eee",
                  height: Math.max(3, (w.hrs/maxWeekHrs)*44)+"px",
                  opacity: w.hrs>0?1:0.4, borderRadius:"2px 2px 0 0", transition:"height .3s"
                }}/>
                <div style={{fontFamily:S.bebas,fontSize:8,color:"#888",letterSpacing:1,textAlign:"center",lineHeight:1}}>{w.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── 2. Technique Confidence Tracker ── */}
      <div className="section-head" style={{marginTop:10}}>
        <div className="section-title">Technique Confidence</div>
      </div>
      <div className="rule"/>

      <div className="stats-row">
        <div className="stat-box"><div className="stat-num">{SYLLABUS.techniques.length}</div><div className="stat-lbl">Techniques Required</div></div>
        <div className="stat-box red"><div className="stat-num red">{avgConfidence}<span style={{fontSize:16}}>/5</span></div><div className="stat-lbl">Avg Confidence</div></div>
        <div className="stat-box"><div className="stat-num">{readyCount}</div><div className="stat-lbl">Exam-Ready (4★+)</div></div>
        <div className="stat-box"><div className="stat-num">{pctReady}<span style={{fontSize:16}}>%</span></div><div className="stat-lbl">Overall Readiness</div></div>
      </div>

      {/* Readiness bar */}
      <div style={{background:"#fff",border:"1px solid #eee",padding:"12px 18px",marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontFamily:S.bebas,fontSize:11,letterSpacing:2,color:"#888"}}>OVERALL EXAM READINESS</span>
          <span style={{fontFamily:S.bebas,fontSize:11,letterSpacing:2,color:"#c0392b"}}>{pctReady}%</span>
        </div>
        <div className="progress-bar" style={{height:8,borderRadius:4}}>
          <div className="progress-fill" style={{width:pctReady+"%", borderRadius:4}}/>
        </div>
        <div style={{fontSize:11,color:"#888",marginTop:4}}>Techniques rated 4★ or higher are considered exam-ready</div>
      </div>

      {/* Group filter */}
      <div className="cat-bar">
        {groups.map(g => {
          const gc = GROUP_COLORS[g];
          return (
            <button key={g} className={"cat-tab"+(activeGroup===g?" on":"")}
              style={activeGroup===g && gc ? {color:gc.color, borderBottomColor:gc.color} : {}}
              onClick={()=>setActiveGroup(g)}>
              {g}
            </button>
          );
        })}
      </div>

      {/* Technique list */}
      {(() => {
        const attackGroups = {};
        visibleTechs.forEach(t => {
          if (!attackGroups[t.attack]) attackGroups[t.attack] = [];
          attackGroups[t.attack].push(t);
        });
        return Object.entries(attackGroups).map(([attack, techs]) => (
          <div key={attack} style={{marginBottom:20}}>
            <div style={{fontFamily:S.bebas,fontSize:12,letterSpacing:3,color:"#888",textTransform:"uppercase",
              borderBottom:"1px solid #eee",paddingBottom:5,marginBottom:10}}>{attack}</div>
            {techs.map(t => {
              const gc = GROUP_COLORS[t.group];
              const conf = confidence[t.id] || 0;
              const confLabel = ["—","Unfamiliar","Seen it","Can do it","Comfortable","Exam-ready"][conf];
              const confColor = ["#ccc","#e74c3c","#e67e22","#f1c40f","#2ecc71","#27ae60"][conf];
              return (
                <div key={t.id} className="tech-conf-row" style={{
                  display:"flex", alignItems:"center", justifyContent:"space-between",
                  padding:"10px 14px", marginBottom:6, background:"#fff",
                  border:"1px solid #eee", borderLeft:"3px solid "+(gc?gc.color:"#eee"),
                  flexWrap:"wrap", gap:8
                }}>
                  <div style={{flex:1,minWidth:200}}>
                    <div style={{fontWeight:700,fontSize:14,marginBottom:1}}>{t.name}</div>
                    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                      <span style={{fontSize:10,fontWeight:600,padding:"1px 7px",borderRadius:2,
                        background:gc?gc.bg:"#f0f0f0",color:gc?gc.color:"#555"}}>{t.group}</span>
                      {t.notes && <span style={{fontSize:11,color:"#888",fontStyle:"italic"}}>{t.notes}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <span style={{fontSize:11,fontWeight:600,color:confColor,minWidth:80,textAlign:"right"}}>{confLabel}</span>
                    <Stars techId={t.id}/>
                  </div>
                </div>
              );
            })}
          </div>
        ));
      })()}
    </div>
  );
}

// ── Encyclopedia ──────────────────────────────────────────────────────────────
function Encyclopedia() {
  const [techs, setTechs]     = useState(SEED_ENC);
  const [detail, setDetail]   = useState(null);
  const [search, setSearch]   = useState("");
  const [cat, setCat]         = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [nt, setNt]           = useState({name:"",category:"Throwing",attack:"",description:"",videoUrl:"",tags:""});

  const cats     = [...new Set(techs.map(t=>t.category))];
  const filtered = techs.filter(t=>{
    const q = search.toLowerCase();
    if (q && !t.name.toLowerCase().includes(q) && !t.description.toLowerCase().includes(q)) return false;
    if (cat && t.category!==cat) return false;
    return true;
  });

  const save = () => {
    if (!nt.name.trim()) return;
    setTechs(p=>[...p,{...nt,id:uid(),tags:nt.tags.split(",").map(t=>t.trim()).filter(Boolean)}]);
    setNt({name:"",category:"Throwing",attack:"",description:"",videoUrl:"",tags:""});
    setShowAdd(false);
  };

  return (
    <div>
      <div className="section-head">
        <div className="section-title">Encyclopedia</div>
        <button className="btn red" onClick={()=>setShowAdd(true)}>+ Add Technique</button>
      </div>
      <div className="rule"/>
      <div className="filter-row">
        <div><label>Search</label><input placeholder="Name or description…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <div><label>Category</label><select value={cat} onChange={e=>setCat(e.target.value)}><option value="">All Categories</option>{cats.map(c=><option key={c}>{c}</option>)}</select></div>
      </div>
      {filtered.length===0 && <Empty label="ENC"/>}
      <div className="g3">
        {filtered.map(t=>(
          <div key={t.id} className="enc-card" onClick={()=>setDetail(t)}>
            <div style={{fontFamily:S.bebas,fontSize:10,letterSpacing:3,color:S.dg,marginBottom:3}}>{t.category}</div>
            <div style={{fontWeight:700,fontSize:19,marginBottom:2}}>{t.name}</div>
            <div style={{fontSize:11,color:S.red,fontWeight:600,marginBottom:7}}>{t.attack}</div>
            <div style={{fontSize:12,lineHeight:1.8,color:S.dk,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical"}}>{t.description}</div>
            <div style={{marginTop:8}}>{t.tags.map(tag=><span key={tag} className="tag" style={{cursor:"default"}}>{tag}</span>)}</div>
          </div>
        ))}
      </div>

      <Modal open={!!detail} onClose={()=>setDetail(null)}>
        {detail && <>
          <div style={{fontFamily:S.bebas,fontSize:10,letterSpacing:3,color:S.red,marginBottom:4}}>{detail.category} · {detail.attack}</div>
          <div style={{fontWeight:700,fontSize:28,marginBottom:12}}>{detail.name}</div>
          <p style={{fontSize:13,lineHeight:1.85,color:S.dk}}>{detail.description}</p>
          <div style={{marginTop:10}}>{detail.tags.map(t=><span key={t} className="tag" style={{cursor:"default"}}>{t}</span>)}</div>
          {detail.videoUrl
            ? <iframe style={{width:"100%",aspectRatio:"16/9",border:"none",marginTop:14}} src={detail.videoUrl} allowFullScreen/>
            : <div className="video-ph">No video linked yet</div>}
        </>}
      </Modal>

      <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="Add Technique">
        <div className="fr"><div className="fg"><label>Name</label><input value={nt.name} onChange={e=>setNt(p=>({...p,name:e.target.value}))}/></div><div className="fg"><label>Category</label><select value={nt.category} onChange={e=>setNt(p=>({...p,category:e.target.value}))}>{["Throwing","Pinning","Breath Power","Weapons","Other"].map(c=><option key={c}>{c}</option>)}</select></div></div>
        <div className="fg"><label>Attack / Entry</label><input value={nt.attack} onChange={e=>setNt(p=>({...p,attack:e.target.value}))}/></div>
        <div className="fg"><label>Description</label><textarea rows={4} value={nt.description} onChange={e=>setNt(p=>({...p,description:e.target.value}))}/></div>
        <div className="fg"><label>YouTube Embed URL</label><input value={nt.videoUrl} onChange={e=>setNt(p=>({...p,videoUrl:e.target.value}))}/></div>
        <div className="fg"><label>Tags (comma separated)</label><input value={nt.tags} onChange={e=>setNt(p=>({...p,tags:e.target.value}))}/></div>
        <div className="fa"><button className="ghost" onClick={()=>setShowAdd(false)}>Cancel</button><button className="btn red" onClick={save}>Save Technique</button></div>
      </Modal>
    </div>
  );
}

// ── App shell ─────────────────────────────────────────────────────────────────
const TABS = [
  {id:"log",    label:"Training Log"},
  {id:"journal",label:"Learning Journal"},
  {id:"sem",    label:"Seminars"},
  {id:"grade",  label:"Grading Journey"},
  {id:"enc",    label:"Encyclopedia"},
];

function App() {
  const [tab, setTab]           = useState("log");
  const [sessions, setSessions] = useState(SEED_SESSIONS);
  const [confidence, setConfidence] = useState({});

  return (
    <>
      <style>{css}</style>
      <div className="app-wrap">
        <div className="grid-bg"/>
        <header className="hdr">
          <div className="hdr-in">
            <div className="logo-row">
              <Logo/>
              <div>
                <div className="wordmark">AIKI<span>DOJO</span></div>
                <div className="tagline">Training · Learning · Practice</div>
              </div>
            </div>
          </div>
        </header>
        <nav className="nav">
          <div className="nav-in">
            {TABS.map(t => (
              <button key={t.id} className={"ntab"+(tab===t.id?" on":"")} onClick={()=>setTab(t.id)}>{t.label}</button>
            ))}
          </div>
        </nav>
        <main className="main">
          <div className="main-inner">
            {tab==="log"     && <TrainingLog sessions={sessions} setSessions={setSessions} confidence={confidence} setConfidence={setConfidence}/>}
            {tab==="journal" && <LearningJournal sessions={sessions} setSessions={setSessions} confidence={confidence} setConfidence={setConfidence}/>}
            {tab==="sem"     && <Seminars/>}
            {tab==="grade"   && <GradingJourney sessions={sessions} confidence={confidence} setConfidence={setConfidence}/>}
            {tab==="enc"     && <Encyclopedia/>}
          </div>
        </main>
        <footer className="ftr">AikiDojo &nbsp;·&nbsp; Train with intention &nbsp;·&nbsp; Learn without end</footer>
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
